menu:
  title: "&#00E5FF✦ Editor: %region_alias%"
  size: 54
  filler:
    material: BLACK_STAINED_GLASS_PANE
    name: " "
  items:
    '4':
      material: BEDROCK
      name: "&#00E5FFRegion &8▸ &#B388FF%region_alias%"
      lore:
        - "&7Dashboard | Info"
        - ""
        - "&f Welcome, &b%player_name%&f."
        - "&f You are editing this region."
        - "&8▪ &fInternal ID: &7%region%"
      action: "NONE"

    '22':
      material: ENDER_PEARL
      name: "&#00E5FFRegion &8▸ &#FFD700Teleport"
      lore:
        - "&8Action | Travel"
        - ""
        - "&f Travel directly to the center"
        - "&f of this protection."
        - ""
        - "&#FFD700▸ Click to travel!"
      action: "[CLOSE];[MESSAGE] messages.teleporting;[DELAY_CMD] 3 ps home"

    '28':
      material: RED_DYE
      name: "&#00E5FFRegion &8▸ &cBanned Players"
      lore:
        - "&8Action | Management"
        - ""
        - "&f Manage players who are blocked"
        - "&f from entering this region."
        - ""
        - "&#FFD700▸ Click to view!"
      action: "[OPEN_BANNED]"

    '29':
      material: GOLDEN_HELMET
      name: "&#00E5FFRegion &8▸ &#FFD700Owners"
      lore:
        - "&8Action | Management"
        - ""
        - "&f Manage players who have full"
        - "&f ownership of this region."
        - ""
        - "&#FFD700▸ Click to view!"
      action: "[OPEN_OWNERS]"

    '30':
      material: IRON_HELMET
      name: "&#00E5FFRegion &8▸ &#FFD700Members"
      lore:
        - "&8Action | Management"
        - ""
        - "&f Manage players who can"
        - "&f build and interact here."
        - ""
        - "&#FFD700▸ Click to view!"
      action: "[OPEN_MEMBERS]"

    '31':
      material: REDSTONE_TORCH
      name: "&#00E5FFRegion &8▸ &#FFD700Flags (Settings)"
      lore:
        - "&8Action | Settings"
        - ""
        - "&f Configure PvP, mob spawning,"
        - "&f explosions, and more."
        - ""
        - "&#FFD700▸ Click to open!"
      action: "[OPEN_MENU] flags"

    '32':
      material: GLASS
      name: "&#00E5FFRegion &8▸ &#B388FFToggle Visibility"
      lore:
        - "&8Action | Visuals"
        - ""
        - "&f Hide or show the physical block"
        - "&f that creates this protection."
        - ""
        - "&8▪ &fCurrent Status: %hidden_status%"
        - ""
        - "&#FFD700▸ Left-Click &7- &fHide Block!"
        - "&#FFD700▸ Right-Click &7- &fShow Block!"
      action_left: "[PLAYER] ps hide;[MESSAGE] messages.hide-success;[REFRESH]"
      action_right: "[PLAYER] ps unhide;[MESSAGE] messages.unhide-success;[REFRESH]"

    '33':
      material: NAME_TAG
      name: "&#00E5FFRegion &8▸ &#B388FFRename Region"
      lore:
        - "&8Action | Customization"
        - ""
        - "&f Give your protection a unique,"
        - "&f custom display name."
        - ""
        - "&8▪ &fCurrent Name: &#00E5FF%region_alias%"
        - "&c (Do not use color codes!)"
        - ""
        - "&#FFD700▸ Click to rename!"
      action: "[RENAME]"

    '34':
      material: WHITE_BED
      name: "&#00E5FFRegion &8▸ &#B388FFSet Home"
      lore:
        - "&8Action | Settings"
        - ""
        - "&f Update the spawn location for"
        - "&f when you teleport here."
        - ""
        - "&#FFD700▸ Click to set home!"
      action: "[PLAYER] ps sethome;[CLOSE];[MESSAGE] messages.sethome-success"

    '37':
      material: GLOWSTONE_DUST
      name: "&#00E5FFRegion &8▸ &#FFD700View Borders"
      lore:
        - "&8Action | Visuals"
        - ""
        - "&f Display or hide the boundary"
        - "&f particles of this region."
        - ""
        - "&#FFD700▸ Click to toggle borders!"
      action: "[PLAYER] ps view;[CLOSE];[MESSAGE] messages.border-success"

    '43':
      material: TNT
      name: "&#00E5FFRegion &8▸ &cDelete Protection"
      lore:
        - "&8Action | Danger"
        - ""
        - "&f Destroy this protection area and"
        - "&f retrieve your original block."
        - "&c This action cannot be undone!"
        - ""
        - "&#FFD700▸ Click to delete!"
      action: "[PLAYER] ps reclaim;[CLOSE]"

    '45':
      material: SPECTRAL_ARROW
      name: "&#FFD700Back to Protections"
      lore: []
      action: "[OPEN_LIST]"

    '53':
      material: BARRIER
      name: "&cClose Menu"
      lore: []
      action: "[CLOSE]"